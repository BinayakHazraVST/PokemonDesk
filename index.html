<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Desk</title>

    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./favicon.ico" />

    <meta name="description"
        content="ultimate digital hub for everything Pokémon! Explore detailed Pokémon profiles, discover abilities and evolutions, build your dream team, and dive into the exciting world of trainers, regions, and battles. Whether you're a longtime Pokémon Master or just starting your journey, Pokémon Desk brings the Pokémon universe to your fingertips with a sleek and interactive experience." />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Pokemon Desk" />
    <meta property="og:description"
        content="ultimate digital hub for everything Pokémon! Explore detailed Pokémon profiles, discover abilities and evolutions, build your dream team, and dive into the exciting world of trainers, regions, and battles. Whether you're a longtime Pokémon Master or just starting your journey, Pokémon Desk brings the Pokémon universe to your fingertips with a sleek and interactive experience." />
    <meta property="og:image" content="./PokeBall_ogImage.png" />

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

<body>
    <div class="pokemonDesk">
        <nav>
            <i class="ri-menu-fill"></i>

            <div class="pokemonMenu">
                <div class="pokemonWindow"></div>
                <div class="pokemonWindow"></div>
                <div class="pokemonWindow"></div>
                <div class="pokemonWindow"></div>
            </div>

        </nav>

        <div class="pokemonCard">
            <header>
                <div class="pokemonLogoContainer">
                    <img src="./Pokemon_logo.png" alt="Pokemon Logo" loading="lazy" />
                </div>
            </header>

            <main>

                <p class="pokemonType">POKEMON GEN I</p>

                <h1>Pikachu</h1>

                <p class="pokemonDescription">Pikachu is an Electric-type Pokémon introduced in
                    Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost
                    completely covered by yellow fur.
                </p>

                <div class="pageNav">
                    <span class="line"></span>
                    <p>01 / 08</p>
                </div>

            </main>

            <footer>
                <div class="pokemonStamp">
                </div>

            </footer>
        </div>

        <div class="pokemonImage">
            <img src="./pikachu.png" alt="Pikachu Image" loading="lazy" />
        </div>
    </div>
</body>

</html>
